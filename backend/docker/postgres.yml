
version: '3.8'
services:
  # Base de données PostgreSQL
  postgres_campaign_message_db:
    image: postgres:latest
    container_name: postgres_campaign_message_db
    restart: always
    environment:
      POSTGRES_DB: campaign_message_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Optionnel : pour créer plusieurs bases
      # POSTGRES_MULTIPLE_DATABASES: db1,db2,db3
    ports:
      - "25432:5432"
    volumes:
      # Persistance des données
      - postgres_campaign_message_data:/var/lib/postgresql
      # Optionnel : scripts d'initialisation
      #- ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - postgres_network
volumes:
  postgres_campaign_message_data:

networks:
  postgres_network:
    driver: bridge